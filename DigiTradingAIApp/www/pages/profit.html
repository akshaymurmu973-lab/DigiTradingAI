<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Profit Loss Calculator

</title>

<link rel="stylesheet"
href="../style.css">

</head>

<body>

<div class="container">

<div class="header">

<h1>

Profit / Loss

</h1>

<p>

Digi Trading AI

</p>

</div>



<div class="card">

<input

type="number"

id="buy"

placeholder="Buy Price"

>

<br><br>

<input

type="number"

id="sell"

placeholder="Sell Price"

>

<br><br>

<input

type="number"

id="qty"

placeholder="Quantity"

>

<br><br>


<button

onclick="calculateProfit()"

>

Calculate

</button>


<h2 id="result">

</h2>

</div>

</div>



<script>

function calculateProfit(){


let buy=

parseFloat(

document.getElementById(

"buy"

).value

);



let sell=

parseFloat(

document.getElementById(

"sell"

).value

);



let qty=

parseFloat(

document.getElementById(

"qty"

).value

);



let profit=

(

sell-buy

)

*

qty;



if(

profit>=0

){

document

.getElementById(

"result"

)

.innerHTML=

"Profit : $ "

+

profit.toFixed(2);

}

else{

document

.getElementById(

"result"

)

.innerHTML=

"Loss : $ "

+

Math.abs(

profit

).toFixed(2);

}

}

</script>

</body>

</html>
